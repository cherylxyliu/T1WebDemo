<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>替身 v1.3 验收测试</title>
    <style>
        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #f2f2f2;
        }
        h1 { margin: 0 0 12px; font-size: 24px; }
        p { margin: 0 0 20px; color: #a6a6a6; line-height: 1.6; }
        .pass { color: #78ff9e; }
        .fail { color: #ff7474; }
        ul { padding-left: 20px; line-height: 1.7; }
        code {
            background: rgba(255,255,255,.08);
            padding: 2px 6px;
            border-radius: 6px;
        }
        iframe {
            width: 390px;
            height: 844px;
            border: 1px solid #333;
            border-radius: 20px;
            margin-top: 20px;
            background: #000;
        }
    </style>
</head>
<body>
    <h1 id="summary">运行中...</h1>
    <p>这页会加载 <code>index.html?test=1</code>，检查 v1.3 的 AR 导航、持续上推前进、路牌擦拭隐藏显现、以及“替身接管”终局是否具备。</p>
    <ul id="results"></ul>
    <iframe id="game-frame" src="./index.html?test=1" title="替身测试沙盒"></iframe>

    <script>
        const resultsEl = document.getElementById('results');
        const summaryEl = document.getElementById('summary');
        const wait = ms => new Promise(resolve => setTimeout(resolve, ms));

        function addResult(ok, message) {
            const li = document.createElement('li');
            li.className = ok ? 'pass' : 'fail';
            li.textContent = `${ok ? 'PASS' : 'FAIL'} - ${message}`;
            resultsEl.appendChild(li);
            return ok;
        }

        function finish(total, passed) {
            const failed = total - passed;
            summaryEl.textContent = failed === 0 ? `PASS ${passed}/${total}` : `FAIL ${passed}/${total}`;
            summaryEl.className = failed === 0 ? 'pass' : 'fail';
            document.title = summaryEl.textContent;
        }

        async function run() {
            const frame = document.getElementById('game-frame');
            await new Promise(resolve => frame.addEventListener('load', resolve, { once: true }));
            await wait(350);

            const win = frame.contentWindow;
            const doc = frame.contentDocument;
            let total = 0;
            let passed = 0;

            total++;
            if (addResult(Boolean(win.__gameTestAPI), '暴露 v1.3 测试 API')) passed++;
            if (!win.__gameTestAPI) {
                finish(total, passed);
                return;
            }

            const api = win.__gameTestAPI;

            total++;
            const introScreen = doc.getElementById('screen-intro');
            const matchScreen = doc.getElementById('screen-match');
            const matchStyle = matchScreen ? win.getComputedStyle(matchScreen) : null;
            if (addResult(Boolean(introScreen && introScreen.classList.contains('active') && matchStyle && matchStyle.display === 'none'), '初始打开时显示介绍页，MATCH 过场不会直接裸露')) passed++;

            api.resetForTest('测试用户');

            total++;
            api.showMonologueForTest('更明显的内心独白');
            const monologueBox = doc.getElementById('monologue');
            if (addResult(Boolean(monologueBox && monologueBox.classList.contains('show') && api.getMonologueText().includes('更明显的内心独白')), '内心独白层可独立显示')) passed++;

            total++;
            const thumb = api.getThumbState();
            if (addResult(Boolean(thumb && thumb.hasAssetThumb && thumb.hasNoGuideBubble), '写实手部素材存在，且无旧引导气泡')) passed++;

            total++;
            api.swipeCreepyLeftForTest();
            await wait(120);
            if (addResult(api.getMonologueText().includes('这个人还怪特别的，不如匹配一下试试'), '异常卡左滑会弹回并显示指定独白')) passed++;

            total++;
            api.swipeCreepyRightForTest();
            await wait(900);
            if (addResult(doc.getElementById('screen-chat').classList.contains('active') && Boolean(doc.getElementById('address-link')), '异常卡右滑后进入聊天页并保留地址链接')) passed++;

            total++;
            api.startMapForTest();
            await wait(100);
            const mapState = api.getMapState();
            if (addResult(Boolean(mapState.hasArView && mapState.hasMapView && mapState.hasTouchZone && mapState.hasThumbOverlay), '地图页已改为上半 AR + 下半 2D 地图结构')) passed++;

            total++;
            const beforeDistance = api.getDistance();
            api.startWalkingForTest();
            await wait(450);
            api.stopWalkingForTest();
            const afterDistance = api.getDistance();
            if (addResult(afterDistance < beforeDistance, '按住上推后会持续前进，距离连续缩短')) passed++;

            total++;
            api.openSignEventForTest();
            await wait(80);
            const signBefore = api.getSignState();
            api.scrubSignForTest(45);
            await wait(80);
            const signMiddle = api.getSignState();
            api.scrubSignForTest(100);
            await wait(120);
            const signAfter = api.getSignState();
            if (addResult(signBefore.textVisible === false && signMiddle.textVisible === false && signAfter.textVisible === true && signAfter.progress === 100, '路牌文字默认隐藏，擦拭完成后才出现“不要回头”')) passed++;

            total++;
            if (addResult(api.usesRealCamera() === false, '终局不调用真实相机权限')) passed++;

            total++;
            api.triggerEndingForTest();
            await wait(500);
            let endingState = api.getEndingState();
            const permissionOk = endingState.permissionVisible && endingState.allowButtonCount === 1;
            api.clickAllowForTest();
            await wait(4200);
            endingState = api.getEndingState();
            if (addResult(permissionOk && endingState.focusLocked && endingState.desktopShown && endingState.handTookOver && endingState.finalTitleShown, '终局具备单按钮权限→识别锁定→伪桌面→替身之手接管→标题淡入')) passed++;

            finish(total, passed);
        }

        run().catch(error => {
            addResult(false, `测试页执行异常: ${error.message}`);
            finish(resultsEl.children.length || 1, 0);
        });
    </script>
</body>
</html>
